context:
  version: "3.1.1"
  python_min: "3.10"
  python_max: "3.14.3"

package:
  name: tsam
  version: ${{ version }}

source:
  url: https://github.com/FZJ-IEK3-VSA/tsam/archive/v${{ version }}.tar.gz
  sha256: 391e3126a4086bf084f94741fc02990709981612c8785889771ac2272cf2685d

build:
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation
  noarch: python
  number: 0

requirements:
  host:
  - python ${{ python_min }}.*
  - setuptools >=77.0.0
  - pip
  run:
  - python >=${{ python_min }},<=${{ python_max }}
  - scikit-learn >=1.3.0,<=1.8.0
  - pandas >=2.2.0,<=3.0.1
  - numpy >=1.22.4,<=2.4.2
  - pyomo >=6.4.3,<=6.10.0
  - networkx >=2.5,<=3.6.1
  - tqdm >=4.21.0,<=4.67.3
  - highspy >=1.7.2,<=1.13.1
  - plotly >=5.0.0

tests:
- script:
    - pytest -n auto -vvv
  requirements:
      run:
        - pytest
        - pytest-xdist
        - python ${{ python_min }}.*
  files:
      source:
        - .
about:
  homepage: https://github.com/FZJ-IEK3-VSA/tsam
  summary: Time series aggregation module (tsam) to create typical periods
  license: MIT
  license_file: LICENSE.txt
  doc_url: https://tsam.readthedocs.io/en/master/
  dev_url: https://github.com/FZJ-IEK3-VSA/tsam

extra:
  recipe-maintainers:
    - julian-belina
